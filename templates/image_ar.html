
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARVR Studio</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#info{
position:absolute;
top:10px;
width:100%;
text-align:center;
color:white;
background:rgba(0,0,0,.6);
padding:8px;
z-index:10;
}

/* toolbar */

#toolbar{
position:fixed;
bottom:30px;
width:100%;
text-align:center;
z-index:20;
}

button{
padding:10px 16px;
margin:4px;
border:none;
border-radius:6px;
background:#007bff;
color:white;
font-size:14px;
}

/* Start AR button */

button[aria-label="Start AR"]{

position:fixed !important;
bottom:100px !important;
left:50%;
transform:translateX(-50%);

background:#007bff !important;
color:white !important;

padding:14px 30px !important;

border-radius:30px !important;

font-size:16px !important;

z-index:100;

}

</style>

</head>

<body>

<div id="info">
Move phone slowly → Tap to place image
</div>

<div id="toolbar">

<button onclick="capture()">📷 Capture</button>

<button onclick="resetScene()">🔄 Reset</button>

</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js";

import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/webxr/ARButton.js";

let camera, scene, renderer;
let controller;
let reticle;

let hitTestSource=null;
let hitTestSourceRequested=false;

let objectPlaced=false;
let arObject=null;

let startDistance=0;
let startScale=1;
let startRotation=0;

init();

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
20
);

renderer=new THREE.WebGLRenderer({
antialias:true,
alpha:true,
preserveDrawingBuffer:true
});

renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth,window.innerHeight);

renderer.xr.enabled=true;

document.body.appendChild(renderer.domElement);

document.body.appendChild(
ARButton.createButton(renderer,{
requiredFeatures:["hit-test"]
})
);

/* light */

const light=new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
scene.add(light);

/* reticle */

const ring=new THREE.RingGeometry(0.15,0.18,64).rotateX(-Math.PI/2);

reticle=new THREE.Mesh(
ring,
new THREE.MeshBasicMaterial({
color:0xffffff,
transparent:true,
opacity:.9
})
);

reticle.matrixAutoUpdate=false;
reticle.visible=false;

const dot=new THREE.Mesh(
new THREE.CircleGeometry(0.02,32),
new THREE.MeshBasicMaterial({color:0xffffff})
);

dot.rotation.x=-Math.PI/2;

reticle.add(dot);

scene.add(reticle);

/* controller */

controller=renderer.xr.getController(0);
controller.addEventListener("select",placeObject);
scene.add(controller);

renderer.setAnimationLoop(render);

window.addEventListener("resize",resize);

/* touch gestures */

window.addEventListener("touchstart",touchStart);
window.addEventListener("touchmove",touchMove);

}

/* place object */

function placeObject(){

if(!reticle.visible) return;

if(objectPlaced) return;

objectPlaced=true;

const loader=new THREE.TextureLoader();

loader.crossOrigin="anonymous";

loader.load("{{ project.file_url }}",texture=>{

const ratio=texture.image.width/texture.image.height;

const geometry=new THREE.PlaneGeometry(1,1/ratio);

const material=new THREE.MeshStandardMaterial({
map:texture,
transparent:true,
side:THREE.DoubleSide
});

arObject=new THREE.Mesh(geometry,material);

/* shadow */

const shadow=new THREE.Mesh(
new THREE.CircleGeometry(.5,32),
new THREE.MeshBasicMaterial({
color:0x000000,
opacity:.35,
transparent:true
})
);

shadow.rotation.x=-Math.PI/2;
shadow.position.y=-.01;

arObject.add(shadow);

/* position */

arObject.position.setFromMatrixPosition(reticle.matrix);
arObject.quaternion.setFromRotationMatrix(reticle.matrix);

/* wall lock */

arObject.rotateX(-Math.PI/2);

scene.add(arObject);

});

}

/* gestures */

function touchStart(e){

if(!arObject) return;

if(e.touches.length==2){

startDistance=getDistance(e.touches);

startScale=arObject.scale.x;

startRotation=getAngle(e.touches);

}

}

function touchMove(e){

if(!arObject) return;

if(e.touches.length==2){

let newDist=getDistance(e.touches);

let scale=startScale*(newDist/startDistance);

arObject.scale.set(scale,scale,scale);

let angle=getAngle(e.touches);

arObject.rotation.z+=angle-startRotation;

startRotation=angle;

}

}

/* helpers */

function getDistance(t){

let dx=t[0].clientX-t[1].clientX;
let dy=t[0].clientY-t[1].clientY;

return Math.sqrt(dx*dx+dy*dy);

}

function getAngle(t){

return Math.atan2(
t[1].clientY-t[0].clientY,
t[1].clientX-t[0].clientX
);

}

/* screenshot */

window.capture=function(){

renderer.render(scene,camera);

const link=document.createElement("a");

link.download="ar_capture.png";

link.href=renderer.domElement.toDataURL();

link.click();

}

/* reset */

window.resetScene=function(){

if(arObject){

scene.remove(arObject);
arObject=null;

}

objectPlaced=false;

}

/* render loop */

function render(timestamp,frame){

if(frame){

const referenceSpace=renderer.xr.getReferenceSpace();
const session=renderer.xr.getSession();

if(!hitTestSourceRequested){

session.requestReferenceSpace("viewer").then(space=>{

session.requestHitTestSource({space:space}).then(source=>{
hitTestSource=source;
});

});

hitTestSourceRequested=true;

}

if(hitTestSource){

const hits=frame.getHitTestResults(hitTestSource);

if(hits.length){

const hit=hits[0];

const pose=hit.getPose(referenceSpace);

reticle.visible=true;

reticle.matrix.fromArray(pose.transform.matrix);

}else{

reticle.visible=false;

}

}

}

renderer.render(scene,camera);

}

/* resize */

function resize(){

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

}

</script>

</body>
</html>
