<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARVR Studio - Advanced AR Viewer</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
}

/* TOP MESSAGE */

#info{
position:absolute;
top:10px;
width:100%;
text-align:center;
color:white;
font-size:16px;
z-index:10;
background:rgba(0,0,0,.6);
padding:8px;
}

/* TOOLBAR */

#toolbar{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
z-index:20;
}

button{
padding:10px 16px;
margin:4px;
border:none;
border-radius:6px;
background:#007bff;
color:white;
font-size:14px;
}

button.delete{
background:#e63946;
}

</style>

</head>

<body>

<div id="info">
Move phone slowly → Tap to place image
</div>

<div id="toolbar">

<button onclick="capture()">📷 Capture</button>

<button onclick="deleteObject()" class="delete">🗑 Delete</button>

<button onclick="resetScene()">🔄 Reset</button>

</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/webxr/ARButton.js";

let camera, scene, renderer;
let controller;
let reticle;

let hitTestSource=null;
let hitTestSourceRequested=false;

let objects=[];
let selected=null;

let raycaster=new THREE.Raycaster();
let pointer=new THREE.Vector2();

/* GESTURE VARIABLES */

let startDistance=0;
let startScale=1;
let startRotation=0;
let dragging=false;

init();

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
20
);

renderer=new THREE.WebGLRenderer({
antialias:true,
alpha:true,
preserveDrawingBuffer:true
});

renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled=true;

document.body.appendChild(renderer.domElement);

document.body.appendChild(
ARButton.createButton(renderer,{
requiredFeatures:["hit-test"]
})
);

/* LIGHT */

const light=new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
scene.add(light);

/* PROFESSIONAL WHITE RETICLE */

const ring=new THREE.RingGeometry(0.15,0.18,64).rotateX(-Math.PI/2);

reticle=new THREE.Mesh(
ring,
new THREE.MeshBasicMaterial({
color:0xffffff,
transparent:true,
opacity:0.9
})
);

reticle.matrixAutoUpdate=false;
reticle.visible=false;

/* CENTER DOT */

const dot=new THREE.Mesh(
new THREE.CircleGeometry(0.02,32),
new THREE.MeshBasicMaterial({color:0xffffff})
);

dot.rotation.x=-Math.PI/2;
reticle.add(dot);

scene.add(reticle);

/* CONTROLLER */

controller=renderer.xr.getController(0);
controller.addEventListener("select",placeImage);
scene.add(controller);

renderer.setAnimationLoop(render);

window.addEventListener("resize",resize);

/* TOUCH EVENTS */

window.addEventListener("touchstart",touchStart);
window.addEventListener("touchmove",touchMove);
window.addEventListener("touchend",touchEnd);

}

/* PLACE IMAGE */

function placeImage(){

if(!reticle.visible) return;

const loader=new THREE.TextureLoader();

loader.crossOrigin="anonymous";

loader.load("{{ project.file_url }}",texture=>{

const ratio=texture.image.width/texture.image.height;

const geometry=new THREE.PlaneGeometry(1,1/ratio);

const material=new THREE.MeshStandardMaterial({
map:texture,
transparent:true,
side:THREE.DoubleSide
});

const plane=new THREE.Mesh(geometry,material);

/* SHADOW */

const shadow=new THREE.Mesh(

new THREE.CircleGeometry(0.5,32),

new THREE.MeshBasicMaterial({
color:0x000000,
opacity:0.35,
transparent:true
})

);

shadow.rotation.x=-Math.PI/2;
shadow.position.y=-0.01;

plane.add(shadow);

/* POSITION */

plane.position.setFromMatrixPosition(reticle.matrix);
plane.quaternion.setFromRotationMatrix(reticle.matrix);

plane.rotateX(-Math.PI/2);

scene.add(plane);

objects.push(plane);

});

}

/* OBJECT SELECTION */

function selectObject(x,y){

pointer.x=(x/window.innerWidth)*2-1;
pointer.y=-(y/window.innerHeight)*2+1;

raycaster.setFromCamera(pointer,camera);

const intersects=raycaster.intersectObjects(objects);

if(intersects.length){

selected=intersects[0].object;

selected.material.emissive=new THREE.Color(0x222222);

}else{

selected=null;

}

}

/* TOUCH START */

function touchStart(e){

if(e.touches.length==1){

selectObject(e.touches[0].clientX,e.touches[0].clientY);

dragging=true;

}

if(e.touches.length==2 && selected){

startDistance=getDistance(e.touches);
startScale=selected.scale.x;
startRotation=getAngle(e.touches);

}

}

/* TOUCH MOVE */

function touchMove(e){

if(!selected) return;

if(e.touches.length==1 && dragging){

selected.position.x+=(e.touches[0].movementX||0)*0.002;
selected.position.y-=(e.touches[0].movementY||0)*0.002;

}

if(e.touches.length==2){

let dist=getDistance(e.touches);

let scale=startScale*(dist/startDistance);

selected.scale.set(scale,scale,scale);

let angle=getAngle(e.touches);

selected.rotation.z+=angle-startRotation;

startRotation=angle;

}

}

/* TOUCH END */

function touchEnd(){

dragging=false;

}

/* DELETE OBJECT */

window.deleteObject=function(){

if(selected){

scene.remove(selected);

objects=objects.filter(o=>o!==selected);

selected=null;

}

}

/* RESET */

window.resetScene=function(){

objects.forEach(o=>scene.remove(o));
objects=[];
selected=null;

}

/* SCREENSHOT */

window.capture=function(){

renderer.render(scene,camera);

const link=document.createElement("a");

link.download="ar_capture.png";

link.href=renderer.domElement.toDataURL();

link.click();

}

/* HELPER FUNCTIONS */

function getDistance(t){

let dx=t[0].clientX-t[1].clientX;
let dy=t[0].clientY-t[1].clientY;

return Math.sqrt(dx*dx+dy*dy);

}

function getAngle(t){

return Math.atan2(
t[1].clientY-t[0].clientY,
t[1].clientX-t[0].clientX
);

}

/* RENDER LOOP */

function render(timestamp,frame){

if(frame){

const referenceSpace=renderer.xr.getReferenceSpace();
const session=renderer.xr.getSession();

if(!hitTestSourceRequested){

session.requestReferenceSpace("viewer").then(space=>{

session.requestHitTestSource({space:space}).then(source=>{
hitTestSource=source;
});

});

hitTestSourceRequested=true;

}

if(hitTestSource){

const hits=frame.getHitTestResults(hitTestSource);

if(hits.length){

const hit=hits[0];
const pose=hit.getPose(referenceSpace);

reticle.visible=true;
reticle.matrix.fromArray(pose.transform.matrix);

}else{

reticle.visible=false;

}

}

}

renderer.render(scene,camera);

}

/* RESIZE */

function resize(){

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

}

</script>

</body>

</html>
