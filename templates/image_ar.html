<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Image Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/webxr/ARButton.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#info{
position:absolute;
top:20px;
width:100%;
text-align:center;
color:white;
font-size:18px;
z-index:10;
background:rgba(0,0,0,.5);
padding:8px;
}

</style>

</head>

<body>

<div id="info">
Move phone → Tap screen to place image
</div>

<script>

let camera, scene, renderer;
let controller;
let imagePlane;

init();

function init(){

scene = new THREE.Scene();

camera = new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
20
);

renderer = new THREE.WebGLRenderer({
antialias:true,
alpha:true
});

renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);

document.body.appendChild(
ARButton.createButton(renderer)
);

/* LIGHT */

const light = new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
scene.add(light);

/* CONTROLLER */

controller = renderer.xr.getController(0);
controller.addEventListener("select", placeImage);
scene.add(controller);

renderer.setAnimationLoop(render);

window.addEventListener("resize",onWindowResize);

}

/* PLACE IMAGE */

function placeImage(){

if(imagePlane) return;

const loader = new THREE.TextureLoader();
loader.crossOrigin = "anonymous";

loader.load("{{ project.file_url }}",function(texture){

const geometry = new THREE.PlaneGeometry(1,1);

const material = new THREE.MeshBasicMaterial({
map:texture,
transparent:true,
side:THREE.DoubleSide
});

imagePlane = new THREE.Mesh(geometry,material);

/* Place 1.5 meters in front of camera */

imagePlane.position.set(0,0,-1.5);

camera.add(imagePlane);

scene.add(camera);

});

}

/* RENDER */

function render(){

renderer.render(scene,camera);

}

/* RESIZE */

function onWindowResize(){

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

}

</script>

</body>

</html>
