<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Viewer</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
}

/* TOP INFO */

#info{
position:absolute;
top:10px;
width:100%;
text-align:center;
color:white;
font-size:16px;
z-index:1000;
background:rgba(0,0,0,.6);
padding:8px;
}

/* TOOLBAR */

#toolbar{
position:fixed;
bottom:30px;
left:0;
width:100%;
text-align:center;
z-index:2000;
}

button{
padding:10px 16px;
margin:4px;
border:none;
border-radius:6px;
background:#007bff;
color:white;
font-size:14px;
}

/* FIX START AR BUTTON */

button[aria-label="Start AR"]{

position:fixed !important;
bottom:90px !important;
left:50% !important;
transform:translateX(-50%) !important;

background:#007bff !important;
color:white !important;

padding:14px 28px !important;

border-radius:30px !important;

font-size:16px !important;

border:none !important;

opacity:1 !important;

z-index:1500;

}

</style>

</head>

<body>

<div id="info">
Move phone slowly → Tap screen to place image
</div>

<div id="toolbar">

<button onclick="capture()">📷 Capture</button>

<button onclick="resetScene()">🔄 Reset</button>

</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js";

import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/webxr/ARButton.js";

let camera, scene, renderer;
let controller;
let reticle;

let hitTestSource=null;
let hitTestSourceRequested=false;

let imagePlaced=false;

let placedObject=null;

init();

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
20
);

renderer=new THREE.WebGLRenderer({
antialias:true,
alpha:true,
preserveDrawingBuffer:true
});

renderer.setPixelRatio(window.devicePixelRatio);

renderer.setSize(window.innerWidth,window.innerHeight);

renderer.xr.enabled=true;

document.body.appendChild(renderer.domElement);

/* START AR BUTTON */

document.body.appendChild(
ARButton.createButton(renderer,{
requiredFeatures:["hit-test"]
})
);

/* LIGHT */

const light=new THREE.HemisphereLight(0xffffff,0xbbbbff,1);

scene.add(light);

/* WHITE RETICLE */

const ringGeometry=new THREE.RingGeometry(0.15,0.18,64).rotateX(-Math.PI/2);

reticle=new THREE.Mesh(

ringGeometry,

new THREE.MeshBasicMaterial({
color:0xffffff,
transparent:true,
opacity:0.9
})

);

reticle.matrixAutoUpdate=false;

reticle.visible=false;

/* CENTER DOT */

const dot=new THREE.Mesh(

new THREE.CircleGeometry(0.02,32),

new THREE.MeshBasicMaterial({color:0xffffff})

);

dot.rotation.x=-Math.PI/2;

reticle.add(dot);

scene.add(reticle);

/* CONTROLLER */

controller=renderer.xr.getController(0);

controller.addEventListener("select",placeImage);

scene.add(controller);

renderer.setAnimationLoop(render);

window.addEventListener("resize",resize);

}

/* PLACE IMAGE */

function placeImage(){

if(!reticle.visible) return;

if(imagePlaced) return;

imagePlaced=true;

const loader=new THREE.TextureLoader();

loader.crossOrigin="anonymous";

loader.load("{{ project.file_url }}",texture=>{

const ratio=texture.image.width/texture.image.height;

const geometry=new THREE.PlaneGeometry(1,1/ratio);

const material=new THREE.MeshStandardMaterial({
map:texture,
transparent:true,
side:THREE.DoubleSide
});

const plane=new THREE.Mesh(geometry,material);

/* SHADOW */

const shadow=new THREE.Mesh(

new THREE.CircleGeometry(0.5,32),

new THREE.MeshBasicMaterial({
color:0x000000,
opacity:0.35,
transparent:true
})

);

shadow.rotation.x=-Math.PI/2;

shadow.position.y=-0.01;

plane.add(shadow);

/* POSITION */

plane.position.setFromMatrixPosition(reticle.matrix);

plane.quaternion.setFromRotationMatrix(reticle.matrix);

/* FIX ORIENTATION */

plane.rotateX(-Math.PI/2);

scene.add(plane);

placedObject=plane;

});

}

/* CAPTURE SCREENSHOT */

window.capture=function(){

renderer.render(scene,camera);

const link=document.createElement("a");

link.download="ar_capture.png";

link.href=renderer.domElement.toDataURL();

link.click();

}

/* RESET */

window.resetScene=function(){

if(placedObject){

scene.remove(placedObject);

placedObject=null;

}

imagePlaced=false;

}

/* RENDER LOOP */

function render(timestamp,frame){

if(frame){

const referenceSpace=renderer.xr.getReferenceSpace();

const session=renderer.xr.getSession();

if(!hitTestSourceRequested){

session.requestReferenceSpace("viewer").then(space=>{

session.requestHitTestSource({space:space}).then(source=>{

hitTestSource=source;

});

});

hitTestSourceRequested=true;

}

if(hitTestSource){

const hits=frame.getHitTestResults(hitTestSource);

if(hits.length){

const hit=hits[0];

const pose=hit.getPose(referenceSpace);

reticle.visible=true;

reticle.matrix.fromArray(pose.transform.matrix);

}else{

reticle.visible=false;

}

}

}

renderer.render(scene,camera);

}

/* RESIZE */

function resize(){

camera.aspect=window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

}

</script>

</body>

</html>
