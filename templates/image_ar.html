<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebXR Image AR</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/webxr/ARButton.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#info{
position:absolute;
top:15px;
width:100%;
text-align:center;
color:white;
font-size:18px;
z-index:10;
background:rgba(0,0,0,.5);
padding:8px;
}

#start{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
padding:16px 40px;
font-size:18px;
border:none;
border-radius:40px;
background:#0072ff;
color:white;
z-index:20;
}

</style>

</head>

<body>

<div id="info">
Move phone slowly → Tap screen to place image
</div>

<button id="start">Start AR</button>

<script>

let camera, scene, renderer;
let controller;
let reticle;

let hitTestSource=null;
let hitTestSourceRequested=false;

init();

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
20
);

renderer=new THREE.WebGLRenderer({
antialias:true,
alpha:true
});

renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled=true;

document.body.appendChild(renderer.domElement);

const light=new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
scene.add(light);

/* RETICLE */

const geometry=new THREE.RingGeometry(0.15,0.2,32).rotateX(-Math.PI/2);

reticle=new THREE.Mesh(
geometry,
new THREE.MeshBasicMaterial({color:0xffffff})
);

reticle.matrixAutoUpdate=false;
reticle.visible=false;

scene.add(reticle);

/* CONTROLLER */

controller=renderer.xr.getController(0);
controller.addEventListener("select",placeImage);
scene.add(controller);

renderer.setAnimationLoop(render);

}

/* START AR */

document.getElementById("start").onclick=async()=>{

const session=await navigator.xr.requestSession("immersive-ar",{
requiredFeatures:["hit-test"]
});

renderer.xr.setSession(session);

document.getElementById("start").style.display="none";

};

/* PLACE IMAGE */

function placeImage(){

if(!reticle.visible) return;

const loader=new THREE.TextureLoader();
loader.crossOrigin="anonymous";

loader.load("{{ project.file_url }}",(texture)=>{

const plane=new THREE.Mesh(
new THREE.PlaneGeometry(0.8,0.8),
new THREE.MeshBasicMaterial({
map:texture,
transparent:true,
side:THREE.DoubleSide
})
);

plane.position.setFromMatrixPosition(reticle.matrix);
plane.quaternion.setFromRotationMatrix(reticle.matrix);

scene.add(plane);

});

}

/* RENDER LOOP */

function render(timestamp,frame){

if(frame){

const session=renderer.xr.getSession();

const referenceSpace=renderer.xr.getReferenceSpace();

if(!hitTestSourceRequested){

session.requestReferenceSpace("viewer").then((space)=>{

session.requestHitTestSource({space:space}).then((source)=>{

hitTestSource=source;

});

});

hitTestSourceRequested=true;

}

if(hitTestSource){

const hits=frame.getHitTestResults(hitTestSource);

if(hits.length){

const pose=hits[0].getPose(referenceSpace);

reticle.visible=true;
reticle.matrix.fromArray(pose.transform.matrix);

}else{

reticle.visible=false;

}

}

}

renderer.render(scene,camera);

}

</script>

</body>
</html>
