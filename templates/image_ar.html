<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Android WebXR AR</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/webxr/ARButton.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
}

#info{
position:absolute;
top:20px;
width:100%;
text-align:center;
color:white;
font-size:18px;
z-index:10;
background:rgba(0,0,0,.4);
padding:8px;
}

</style>

</head>

<body>

<div id="info">
Move phone to detect wall or floor → Tap screen to place image
</div>

<script>

if(!navigator.xr){
document.body.innerHTML="<h2 style='color:white;text-align:center;margin-top:40vh'>WebXR AR not supported on this device</h2>";
throw new Error("WebXR not supported");
}

let camera, scene, renderer;
let controller;
let reticle;

let hitTestSource = null;
let hitTestSourceRequested = false;

init();

function init(){

scene = new THREE.Scene();

camera = new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
20
);

renderer = new THREE.WebGLRenderer({
antialias:true,
alpha:true
});

renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);

/* AR BUTTON */

document.body.appendChild(
ARButton.createButton(renderer,{
requiredFeatures:["hit-test"],
optionalFeatures:["dom-overlay"],
domOverlay:{root:document.body}
})
);

/* LIGHT */

const light = new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
scene.add(light);

/* RETICLE */

const geometry = new THREE.RingGeometry(0.15,0.2,32).rotateX(-Math.PI/2);

const material = new THREE.MeshBasicMaterial({
color:0xffffff,
side:THREE.DoubleSide
});

reticle = new THREE.Mesh(geometry,material);

reticle.matrixAutoUpdate=false;
reticle.visible=false;

scene.add(reticle);

/* CONTROLLER */

controller = renderer.xr.getController(0);
controller.addEventListener("select", placeImage);

scene.add(controller);

renderer.setAnimationLoop(render);

window.addEventListener("resize",onWindowResize);

}

/* PLACE IMAGE */

function placeImage(){

if(!reticle.visible) return;

/* ENABLE CORS */

const loader = new THREE.TextureLoader();
loader.crossOrigin = "anonymous";

loader.load("{{ project.file_url }}", function(texture){

const geometry = new THREE.PlaneGeometry(0.8,0.8);

const material = new THREE.MeshBasicMaterial({
map:texture,
transparent:true,
side:THREE.DoubleSide
});

const plane = new THREE.Mesh(geometry,material);

plane.position.setFromMatrixPosition(reticle.matrix);
plane.quaternion.setFromRotationMatrix(reticle.matrix);

scene.add(plane);

});

}

/* RENDER LOOP */

function render(timestamp,frame){

if(frame){

const referenceSpace = renderer.xr.getReferenceSpace();
const session = renderer.xr.getSession();

if(!hitTestSourceRequested){

session.requestReferenceSpace("viewer").then(function(space){

session.requestHitTestSource({
space:space
}).then(function(source){

hitTestSource = source;

});

});

session.addEventListener("end",function(){

hitTestSourceRequested = false;
hitTestSource = null;

});

hitTestSourceRequested = true;

}

if(hitTestSource){

const hitTestResults = frame.getHitTestResults(hitTestSource);

if(hitTestResults.length){

const hit = hitTestResults[0];

const pose = hit.getPose(referenceSpace);

reticle.visible = true;

reticle.matrix.fromArray(pose.transform.matrix);

}else{

reticle.visible = false;

}

}

}

renderer.render(scene,camera);

}

/* RESIZE */

function onWindowResize(){

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

}

</script>

</body>
</html>
