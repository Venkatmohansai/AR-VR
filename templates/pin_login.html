
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Secure PIN Verification</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:linear-gradient(135deg,#020617,#020617,#0f172a,#020617);
color:white;
overflow:hidden;
}

/* Background Glow */

body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,#06b6d4,transparent);
top:-200px;
left:-200px;
opacity:.15;
filter:blur(120px);
}

/* Card */

.pin-card{
width:380px;
padding:40px;
border-radius:22px;
background:rgba(30,41,59,.75);
backdrop-filter:blur(20px);
box-shadow:0 10px 40px rgba(0,0,0,.6);
text-align:center;
z-index:2;
}

/* Title */

.pin-title{
font-size:22px;
margin-bottom:20px;
color:#22c55e;
}

/* PIN BOXES */

.pin-inputs{
display:flex;
justify-content:center;
gap:12px;
margin-bottom:25px;
}

.pin-box{
width:55px;
height:60px;
font-size:28px;
text-align:center;
border-radius:12px;
border:none;
background:#0f172a;
color:white;
}

/* Glow Button */

.verify-btn{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:linear-gradient(90deg,#06b6d4,#22c55e);
color:white;
font-weight:600;
box-shadow:0 0 20px rgba(6,182,212,.5);
transition:.25s;
}

.verify-btn:hover{
transform:translateY(-2px);
box-shadow:0 0 30px rgba(6,182,212,1);
}

/* Subtitle */

.subtitle{
color:#94a3b8;
font-size:14px;
margin-bottom:25px;
}

</style>

</head>

<body>

<div class="pin-card">

<h3 class="pin-title">🔐 Secure Access</h3>

<p class="subtitle">
Enter your 4-digit security PIN
</p>

<form action="/verify-pin" method="POST">

<input type="hidden" name="next_page" value="{{ next_page }}">

<div class="pin-inputs">

<input type="password" maxlength="1" class="pin-box" required>
<input type="password" maxlength="1" class="pin-box" required>
<input type="password" maxlength="1" class="pin-box" required>
<input type="password" maxlength="1" class="pin-box" required>

</div>

<input type="hidden" name="pin" id="pin">

<button class="verify-btn">
Verify PIN
</button>

</form>

</div>

<script>

/* Auto move between PIN boxes */

const inputs=document.querySelectorAll(".pin-box");
const hidden=document.getElementById("pin");

inputs.forEach((input,index)=>{

input.addEventListener("input",()=>{

if(input.value.length===1 && index<3){
inputs[index+1].focus();
}

updatePin();

});

});

function updatePin(){

let pin="";

inputs.forEach(i=>{
pin+=i.value;
});

hidden.value=pin;

}

</script>

</body>
</html>
